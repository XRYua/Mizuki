<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TXT Reader</title>
		<style>
			:root {
				color-scheme: dark;
				--bg: #0b0e14;
				--panel: rgba(17, 21, 32, 0.94);
				--text: #e8ecf1;
				--muted: #8e9ab2;
				--line: rgba(255, 255, 255, 0.12);
				--accent: #7aa2f7;
			}
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				background: radial-gradient(circle at top, #11182a, var(--bg));
				color: var(--text);
			}
			header {
				position: sticky;
				top: 0;
				z-index: 10;
				padding: 10px 14px;
				background: var(--panel);
				backdrop-filter: blur(8px);
				border-bottom: 1px solid var(--line);
			}
			.toolbar {
				display: grid;
				grid-template-columns: 1fr minmax(180px, 320px) auto auto;
				gap: 10px;
				align-items: center;
			}
			#reader-title {
				font-weight: 700;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.search {
				display: flex;
				align-items: center;
				gap: 8px;
			}
			input {
				width: 100%;
				padding: 8px 10px;
				border-radius: 8px;
				border: 1px solid var(--line);
				background: #111827;
				color: var(--text);
			}
			button,
			a.action {
				padding: 8px 12px;
				border-radius: 8px;
				border: 1px solid var(--line);
				background: #172036;
				color: var(--text);
				text-decoration: none;
				cursor: pointer;
				white-space: nowrap;
			}
			button:hover,
			a.action:hover {
				border-color: var(--accent);
			}
			#search-status {
				font-size: 12px;
				color: var(--muted);
			}
			main {
				height: calc(100vh - 62px);
				overflow: auto;
				padding: 16px;
			}
			pre {
				margin: 0;
				white-space: pre-wrap;
				word-break: break-word;
				line-height: 1.7;
				font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas,
					"Liberation Mono", monospace;
				font-size: 14px;
				background: rgba(13, 17, 26, 0.65);
				border: 1px solid var(--line);
				border-radius: 10px;
				padding: 16px;
			}
			.loading,
			.error {
				font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			}
			.error {
				color: #ff9090;
			}
			@media (max-width: 900px) {
				.toolbar {
					grid-template-columns: 1fr;
				}
				.search {
					order: 2;
				}
			}
		</style>
	</head>
	<body>
		<header>
			<div class="toolbar">
				<div id="reader-title">TXT Reader</div>
				<div class="search">
					<input id="search-input" type="search" placeholder="Find text in this file..." />
					<button id="search-next" type="button">Find Next</button>
				</div>
				<div id="search-status" aria-live="polite"></div>
				<a id="raw-link" class="action" target="_blank" rel="noreferrer noopener">Open Raw TXT</a>
			</div>
		</header>
		<main>
			<pre id="content" class="loading">Loading text...</pre>
		</main>
		<script>
			const params = new URLSearchParams(window.location.search);
			const src = params.get("src");
			const title = params.get("title") || "TXT Reader";
			const titleElement = document.getElementById("reader-title");
			const contentElement = document.getElementById("content");
			const searchInput = document.getElementById("search-input");
			const searchNextButton = document.getElementById("search-next");
			const searchStatus = document.getElementById("search-status");
			const rawLink = document.getElementById("raw-link");
			titleElement.textContent = title;

			if (!src) {
				contentElement.className = "error";
				contentElement.textContent =
					"Missing src parameter. Use /txt-reader.html?src=/files/example.txt";
				rawLink.style.display = "none";
			} else {
				rawLink.href = src;
				(async () => {
					try {
						const response = await fetch(src);
						if (!response.ok || !response.body) {
							throw new Error(`Failed to load text file: ${response.status}`);
						}

						contentElement.className = "";
						contentElement.textContent = "";

						const reader = response.body.getReader();
						const decoder = new TextDecoder("utf-8");
						const chunks = [];
						let byteCount = 0;

						while (true) {
							const { value, done } = await reader.read();
							if (done) break;
							byteCount += value.byteLength;
							chunks.push(decoder.decode(value, { stream: true }));
							if (chunks.length % 20 === 0) {
								contentElement.textContent = `Loading... ${Math.round(byteCount / 1024)} KB`;
								await new Promise(resolve => requestAnimationFrame(resolve));
							}
						}

						const tail = decoder.decode();
						if (tail) chunks.push(tail);

						const text = chunks.join("");
						contentElement.textContent = text;
						searchStatus.textContent = `Loaded ${text.length.toLocaleString()} characters`;
					} catch (error) {
						contentElement.className = "error";
						contentElement.textContent =
							error instanceof Error ? error.message : "Unknown error";
					}
				})();
			}

			const doFind = () => {
				const keyword = searchInput.value;
				if (!keyword) {
					searchStatus.textContent = "Enter text to search.";
					return;
				}
				const found = window.find(keyword, false, false, true, false, false, false);
				searchStatus.textContent = found
					? `Found: ${keyword}`
					: `No more matches for: ${keyword}`;
			};

			searchInput.addEventListener("keydown", event => {
				if (event.key === "Enter") doFind();
			});
			searchNextButton.addEventListener("click", doFind);
		</script>
	</body>
</html>
